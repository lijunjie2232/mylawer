version: '3.8'

# pay attention:
# 1. Replace all placeholders which look like "<your_xxx>" with actual values.
# 2. Ensure that all environment variables are correctly set for your environment.

services:
  # Main Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile_demo
    container_name: las
    restart: unless-stopped
    ports:
      # - "15432:5432"
      - "3000:3000"
    environment:
      # ============================================
      # Unified LLM Configuration System
      # ============================================
      # Model provider selection (openai | anthropic | ollama | ...)
      LLM_MODEL_PROVIDER: ${LLM_MODEL_PROVIDER}
      
      # Unified model configuration
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      
      # Unified API key (shared by all providers)
      LLM_API_KEY: ${LLM_API_KEY}
      
      USE_FREE_MODEL: ${USE_FREE_MODEL}
      FREE_MODEL_BASE_URL: ${FREE_MODEL_BASE_URL}
      DEFAULT_MODEL: ${DEFAULT_MODEL}
      
      # ============================================
      # Application Configuration
      # ============================================
      NODE_ENV: production
      PORT: 3000
      
      # Log configuration
      LOG_LEVEL: ${LOG_LEVEL}
      
      # ============================================
      # LINE Bot Configuration
      # ============================================
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      LINE_ACCESS_TOKEN: ${LINE_ACCESS_TOKEN}
      
      ALLOWED_MCP_TOOLS: webmcp_deep_search,webmcp_parse_url,webmcp_get_available_engines,legal-mcp_search_laws
      
      # ============================================
      # Database Configuration (PostgreSQL)
      # ============================================
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}?schema=public
      
      # ============================================
      # JWT & Authentication Configuration
      # ============================================
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      SESSION_TOKEN_EXPIRES_IN: ${SESSION_TOKEN_EXPIRES_IN}
      
      # Default admin credentials (change after first login!)
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      
      # docker script env
      RUN_MIGRATIONS: ${RUN_MIGRATIONS}
      INIT_ADMIN: ${INIT_ADMIN}
      
    # volumes:
    #   - postgres_data:/var/lib/postgresql
    #   - postgres_logs:/var/log/postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

