version: '3.8'

# pay attention:
# 1. Replace all placeholders which look like "<your_xxx>" with actual values.
# 2. Ensure that all environment variables are correctly set for your environment.

services:
  # Main Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - CACHEBUST=${CACHEBUST:-1}
    container_name: las-app
    restart: unless-stopped
    ports:
      - "3000:3000" # change with .env.prod
    volumes:
      - ./third/legal-mcp/config.yaml:/app/third/legal-mcp/config.yaml
      - .env.prod:/app/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - sql
    networks:
      - las-net
    # CMD ["pnpm", "db:migrate:deploy", "&&", "pnpm", "start:server"]
    command: "sh -c 'pnpm db:migrate:dev && pnpm start:server'"
  
  sql:
    image: postgres:18.4-trixie
    container_name: las-sql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
      - postgres_logs:/var/log/postgres
    networks:
      - las-net
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  postgres_logs:

networks:
  las-net: